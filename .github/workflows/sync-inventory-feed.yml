name: Sync Nightly Inventory Feed

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FEED_BASE_URL: "https://wgq.ccx.mybluehost.me/website_a56b5af5"
  FEED_FILES: |
    FuszToyota.csv
    FuszChevrolet.csv
    CDJRVincennes.csv
    LouFuszBuickGMC.csv
    LouFuszGroup.csv
    SubaruStLouis.csv
    SubaruStPeters.csv
    NissanMoline.csv
    MazdaEvansville.csv
    LouFuszMazda.csv
    TerreHauteKIA.csv
    KIAOhio.csv
    KIAMoline.csv
    KIAEvansville.csv
    LouFuszKIA.csv
    LouFuszFord.csv
    LouFuszEvansville.csv
    FuszCDJRF.csv

jobs:
  sync-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download latest inventory CSV files
        run: |
          mkdir -p data

          while IFS= read -r file; do
            if [ -z "$file" ]; then
              continue
            fi

            curl -f -sS -o "data/${file}" \
              "${FEED_BASE_URL}/${file}"
          done <<< "$FEED_FILES"

      - name: Check for changes
        id: git_status
        run: |
          while IFS= read -r file; do
            if [ -z "$file" ]; then
              continue
            fi

            git add "data/${file}"
          done <<< "$FEED_FILES"

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated inventory files
        if: steps.git_status.outputs.changed == 'true'
        run: |
          git config user.name "inventory-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Update nightly inventory feed [automated]"
          git push
