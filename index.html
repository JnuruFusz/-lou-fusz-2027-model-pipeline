<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2027 Model Pipeline</title>
    <style>
:root {
  color-scheme: light dark;
  --bg: #f5f7f8;
  --panel: #ffffff;
  --panel-rgb: 255, 255, 255;
  --ink: #202427;
  --muted: #657078;
  --line: #d9e0e4;
  --soft-line: #edf1f3;
  --green: #1b7f53;
  --green-soft: #e7f4ee;
  --blue: #2563a9;
  --blue-soft: #e7f0fb;
  --amber: #976000;
  --amber-soft: #fff4d8;
  --red: #b42318;
  --red-soft: #fde8e6;
  --violet: #7c3aed;
  --violet-soft: #f1eafe;
  --shadow: 0 16px 42px rgba(32, 36, 39, 0.08);
  --shadow-hover: 0 18px 50px rgba(32, 36, 39, 0.13);
  --accent: #2563a9;
  --accent-visible: #2563a9;
  --accent-soft: rgba(37, 99, 169, 0.18);
  --accent-card: rgba(37, 99, 169, 0.13);
  --accent-border: rgba(37, 99, 169, 0.58);
  --accent-glow: rgba(37, 99, 169, 0.42);
  --accent-ink: #4f8dd3;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1419;
    --panel: #151b22;
    --panel-rgb: 21, 27, 34;
    --ink: #eef3f7;
    --muted: #9aa7b2;
    --line: #2a343e;
    --soft-line: #222b34;
    --green: #51d79a;
    --green-soft: #123326;
    --blue: #7cb7ff;
    --blue-soft: #132b45;
    --amber: #f0c76a;
    --amber-soft: #3b2b0f;
    --red: #ff8a7c;
    --red-soft: #411a17;
    --violet: #b99cff;
    --violet-soft: #281f3f;
    --shadow: 0 16px 42px rgba(0, 0, 0, 0.32);
    --shadow-hover: 0 18px 50px rgba(0, 0, 0, 0.42);
  }
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background:
    linear-gradient(180deg, rgba(var(--panel-rgb), 0.9), rgba(var(--panel-rgb), 0.68)),
    radial-gradient(circle at 12% 0%, rgba(37, 99, 169, 0.1), transparent 32%),
    var(--bg);
  color: var(--ink);
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
}

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 28px 32px 20px;
  border-bottom: 1px solid var(--line);
  background: rgba(var(--panel-rgb), 0.92);
  backdrop-filter: blur(14px);
  position: sticky;
  top: 0;
  z-index: 5;
}

.eyebrow {
  margin: 0 0 4px;
  color: var(--blue);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2 {
  margin: 0;
  letter-spacing: 0;
}

h1 {
  font-size: 30px;
  line-height: 1.15;
}

h2 {
  font-size: 18px;
}

main {
  padding: 24px 32px 42px;
}

.header-actions,
.toolbar,
.section-heading,
.task-actions,
.row-actions,
.focus-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.view-switch {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  min-height: 40px;
  padding: 4px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: color-mix(in srgb, var(--panel) 74%, var(--line));
}

.view-tab {
  min-height: 30px;
  padding: 0 12px;
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font: inherit;
  font-size: 13px;
  font-weight: 850;
  transition:
    background 160ms ease,
    color 160ms ease,
    transform 160ms ease;
}

.view-tab:hover {
  color: var(--ink);
}

.view-tab.is-active {
  background: var(--panel);
  color: var(--ink);
  box-shadow: 0 7px 18px rgba(32, 36, 39, 0.1);
}

.button,
select,
input {
  min-height: 40px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--ink);
  font: inherit;
}

.button {
  padding: 0 14px;
  cursor: pointer;
  font-weight: 750;
  transition:
    transform 160ms ease,
    border-color 160ms ease,
    box-shadow 160ms ease,
    background 160ms ease;
}

.button:hover {
  border-color: #aab6bd;
  transform: translateY(-1px);
  box-shadow: 0 8px 18px rgba(32, 36, 39, 0.08);
}

.button:active,
.view-tab:active,
.mini-button:active,
.icon-button:active {
  transform: translateY(1px) scale(0.99);
}

.button:focus-visible,
select:focus-visible,
input:focus-visible,
.mini-button:focus-visible,
.view-tab:focus-visible,
.icon-button:focus-visible {
  outline: 3px solid color-mix(in srgb, var(--blue) 42%, transparent);
  outline-offset: 2px;
}

.button-primary {
  border-color: var(--blue);
  background: var(--blue);
  color: light-dark(#fff, #071018);
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
}

.metric {
  position: relative;
  overflow: hidden;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
}

.metric::after {
  content: "";
  position: absolute;
  inset: auto 0 0;
  height: 4px;
  background: linear-gradient(90deg, var(--blue), var(--violet), var(--green));
}

.metric-label {
  display: block;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.metric strong {
  display: block;
  margin-top: 8px;
  font-size: 34px;
  line-height: 1;
}

.toolbar {
  flex-wrap: wrap;
  margin: 22px 0;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: 0 10px 28px rgba(32, 36, 39, 0.05);
}

label {
  display: grid;
  gap: 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

select,
input {
  width: min(280px, 78vw);
  padding: 0 12px;
}

.board {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 20px;
  align-items: start;
  transition:
    opacity 180ms ease,
    transform 180ms ease;
}

.focus-panel {
  display: none;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  gap: 18px;
  margin: 0 0 22px;
  padding: 20px;
  border: 1px solid var(--accent-border);
  border-radius: 8px;
  background:
    linear-gradient(90deg, var(--accent-card), transparent 52%),
    var(--panel);
  box-shadow: var(--shadow);
  animation: panelIn 220ms ease both;
  position: relative;
  overflow: hidden;
}

.focus-panel::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 10px;
  background: var(--accent-visible);
}

.focus-panel h2 {
  margin-top: 3px;
  font-size: 24px;
}

.focus-meta {
  margin: 8px 0 0;
  color: var(--muted);
  font-weight: 700;
}

.focus-actions {
  grid-column: 1 / -1;
  flex-wrap: wrap;
}

body[data-view="focus"] .focus-panel {
  display: grid;
}

body[data-view="focus"] .board {
  grid-template-columns: 1fr;
}

body[data-view="focus"] .table-section {
  display: none;
}

.section-heading {
  justify-content: space-between;
  margin-bottom: 10px;
}

.count-pill,
.status {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 0 9px;
  border-radius: 999px;
  background: #eef2f4;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
}

.task-list {
  display: grid;
  gap: 10px;
}

.task {
  position: relative;
  overflow: hidden;
  padding: 16px 14px 14px 18px;
  border: 1px solid var(--accent-border);
  border-radius: 8px;
  background:
    linear-gradient(90deg, var(--accent-card), transparent 34%),
    var(--panel);
  box-shadow: 0 10px 26px rgba(32, 36, 39, 0.06);
  transition:
    transform 180ms ease,
    box-shadow 180ms ease,
    border-color 180ms ease;
  animation: cardIn 220ms ease both;
}

.task::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 8px;
  background: var(--accent-visible);
}

.task::after {
  content: "";
  position: absolute;
  inset: 0 0 auto;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-visible), transparent 62%);
}

.task:hover {
  border-color: var(--accent-border);
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}

.task-title {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.task-title > div:first-child,
.table-dealer {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.task-title strong {
  font-size: 15px;
}

.task-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin: 8px 0 12px;
  color: var(--muted);
  font-size: 13px;
}

.dealer-dot {
  width: 13px;
  height: 13px;
  border-radius: 999px;
  background: var(--accent-visible);
  box-shadow:
    0 0 0 4px var(--accent-soft),
    0 0 18px var(--accent-glow);
  flex: 0 0 auto;
}

.brand-badge {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 0 8px;
  border: 1px solid var(--accent-border);
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent-ink);
  font-size: 12px;
  font-weight: 900;
}

.tag-stack {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 6px;
}

.status-needs_seo,
.status-needs_build {
  background: var(--amber-soft);
  color: var(--amber);
}

.status-seo_done,
.status-page_built {
  background: var(--blue-soft);
  color: var(--blue);
}

.status-live {
  background: var(--green-soft);
  color: var(--green);
}

.status-ignored,
.status-snoozed {
  background: #f0eeee;
  color: #615b57;
}

.status-needs_review {
  background: var(--red-soft);
  color: var(--red);
}

.signal {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 0 9px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 850;
  white-space: nowrap;
}

.signal-upcoming {
  background: var(--violet-soft);
  color: var(--violet);
}

.signal-shipped {
  background: var(--blue-soft);
  color: var(--blue);
}

.signal-on_lot {
  background: var(--green-soft);
  color: var(--green);
}

.signal-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 0 0 12px;
}

.mini-button {
  min-height: 28px;
  padding: 0 9px;
  border: 1px solid var(--soft-line);
  border-radius: 999px;
  background: var(--panel);
  color: var(--muted);
  cursor: pointer;
  font: inherit;
  font-size: 12px;
  font-weight: 800;
  transition:
    background 160ms ease,
    color 160ms ease,
    border-color 160ms ease;
}

.mini-button:hover,
.mini-button.is-active {
  border-color: var(--accent-border);
  background: var(--accent-soft);
  color: var(--ink);
}

.table-section {
  margin-top: 26px;
}

.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  box-shadow: 0 12px 34px rgba(32, 36, 39, 0.06);
}

table {
  width: 100%;
  min-width: 900px;
  border-collapse: collapse;
}

th,
td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: middle;
}

th {
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
}

tr:last-child td {
  border-bottom: 0;
}

tbody tr {
  transition: background 140ms ease;
}

tbody tr:hover {
  background: color-mix(in srgb, var(--panel) 78%, var(--line));
}

a {
  color: var(--blue);
  font-weight: 750;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.icon-button {
  width: 34px;
  height: 34px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  cursor: pointer;
}

dialog {
  width: min(720px, calc(100vw - 32px));
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  background: var(--panel);
  color: var(--ink);
}

.toast {
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 20;
  max-width: min(420px, calc(100vw - 32px));
  padding: 13px 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: color-mix(in srgb, var(--panel) 92%, var(--ink));
  color: var(--ink);
  box-shadow: var(--shadow-hover);
  font-size: 14px;
  font-weight: 800;
  opacity: 0;
  pointer-events: none;
  transform: translateY(12px) scale(0.98);
  transition:
    opacity 180ms ease,
    transform 180ms ease;
}

.toast.is-visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.dialog-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

pre {
  overflow: auto;
  padding: 14px;
  border-radius: 8px;
  background: color-mix(in srgb, var(--panel) 82%, var(--line));
  color: var(--ink);
  white-space: pre-wrap;
}

.empty {
  padding: 18px;
  border: 1px dashed var(--line);
  border-radius: 8px;
  color: var(--muted);
  background: rgba(var(--panel-rgb), 0.6);
}

@media (prefers-color-scheme: dark) {
  .dealer-dot {
    box-shadow:
      0 0 0 4px var(--accent-soft),
      0 0 24px var(--accent-glow);
  }

  .task::before {
    filter: saturate(1.45) brightness(1.2);
  }

  .task {
    border-color: var(--accent-border);
    background:
      linear-gradient(90deg, var(--accent-card), transparent 40%),
      var(--panel);
  }

  .brand-badge {
    background: var(--accent-soft);
    color: var(--accent-ink);
  }

  a {
    color: #95c8ff;
  }
}

@keyframes cardIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes panelIn {
  from {
    opacity: 0;
    transform: translateY(-6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 1ms !important;
    scroll-behavior: auto !important;
    transition-duration: 1ms !important;
  }
}

@media (max-width: 900px) {
  .app-header,
  main {
    padding-left: 18px;
    padding-right: 18px;
  }

  .app-header,
  .board {
    grid-template-columns: 1fr;
  }

  .app-header {
    display: grid;
  }

  .summary-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .focus-panel {
    grid-template-columns: 1fr;
  }

  .focus-panel .tag-stack {
    justify-content: flex-start;
  }
}

@media (max-width: 560px) {
  .summary-grid {
    grid-template-columns: 1fr;
  }

  .header-actions,
  .view-switch,
  .task-actions,
  .row-actions {
    align-items: stretch;
    flex-direction: column;
  }

  .view-switch {
    border-radius: 8px;
  }

  .button,
  .view-tab {
    width: 100%;
  }
}

    </style>
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Lou Fusz page production</p>
        <h1>2027 Model Pipeline</h1>
      </div>
      <div class="header-actions">
        <div class="view-switch" aria-label="View mode">
          <button class="view-tab is-active" id="boardViewButton" type="button" data-view="board">Board</button>
          <button class="view-tab" id="focusViewButton" type="button" data-view="focus">Focus</button>
        </div>
        <button id="scanButton" class="button button-primary" type="button">Run Scan</button>
        <button id="digestButton" class="button" type="button">Preview Digest</button>
      </div>
    </header>

    <main>
      <section class="summary-grid" aria-label="Pipeline summary">
        <div class="metric">
          <span class="metric-label">Detected</span>
          <strong id="metricDetected">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Needs SEO</span>
          <strong id="metricSeo">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Ready To Build</span>
          <strong id="metricBuild">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Live</span>
          <strong id="metricLive">0</strong>
        </div>
      </section>

      <section id="focusPanel" class="focus-panel" aria-label="Focus view">
        <div>
          <p class="eyebrow">Next best action</p>
          <h2 id="focusTitle">No task selected</h2>
          <p id="focusMeta" class="focus-meta"></p>
        </div>
        <div id="focusTags" class="tag-stack"></div>
        <div id="focusActions" class="focus-actions"></div>
      </section>

      <section class="toolbar" aria-label="Filters">
        <label>
          Dealership
          <select id="dealerFilter"></select>
        </label>
        <label>
          Status
          <select id="statusFilter">
            <option value="all">All statuses</option>
            <option value="needs_seo">Needs SEO</option>
            <option value="seo_in_progress">SEO In Progress</option>
            <option value="seo_done">SEO Done</option>
            <option value="needs_build">Needs Page Build</option>
            <option value="page_built">Page Built</option>
            <option value="live">Live / Checked</option>
            <option value="ignored">Ignored</option>
            <option value="snoozed">Snoozed</option>
          </select>
        </label>
        <label>
          Search
          <input id="searchInput" type="search" placeholder="Model, make, dealer" />
        </label>
      </section>

      <section class="board" aria-label="Work queues">
        <div>
          <div class="section-heading">
            <h2>SEO Queue</h2>
            <span id="seoCount" class="count-pill">0</span>
          </div>
          <div id="seoQueue" class="task-list"></div>
        </div>
        <div>
          <div class="section-heading">
            <h2>Build Queue</h2>
            <span id="buildCount" class="count-pill">0</span>
          </div>
          <div id="buildQueue" class="task-list"></div>
        </div>
      </section>

      <section class="table-section" aria-label="All model tasks">
        <div class="section-heading">
          <h2>All 2027 Models</h2>
          <span id="visibleCount" class="count-pill">0</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Dealer</th>
                <th>Model</th>
                <th>Status</th>
                <th>Inventory</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="taskTable"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="digestDialog">
      <form method="dialog">
        <div class="dialog-header">
          <h2>Daily Digest Preview</h2>
          <button class="icon-button" value="close" aria-label="Close" type="submit">x</button>
        </div>
        <pre id="digestText"></pre>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script type="module">
const statusLabels = {
  needs_seo: "Needs SEO",
  seo_in_progress: "SEO In Progress",
  seo_done: "SEO Done",
  needs_build: "Needs Page Build",
  page_built: "Page Built",
  live: "Live / Checked",
  ignored: "Ignored",
  snoozed: "Snoozed",
  needs_review: "Needs Review",
};

const signalLabels = {
  upcoming: "Upcoming",
  shipped: "Shipped",
  on_lot: "On lot",
};

const dealerAccents = {
  "Lou Fusz Chrysler Jeep Dodge RAM": "#8f98a3",
  "Lou Fusz Mazda": "#808080",
  "Lou Fusz Toyota": "#eb0a1e",
  "Lou Fusz Buick GMC": "#005daa",
  "Lou Fusz Chevrolet": "#c8a95a",
  "Lou Fusz Kia": "#05141F",
  "Lou Fusz Ford": "#003478",
  "Lou Fusz Chrysler Jeep Dodge Ram Vincennes": "#8f98a3",
  "Lou Fusz Kia Evansville": "#05141F",
  "Lou Fusz Kia of Moline": "#05141F",
  "Lou Fusz Kia Terre Haute": "#05141F",
  "Lou Fusz Mazda Evansville": "#808080",
  "Lou Fusz Nissan Moline": "#c3002f",
  "Lou Fusz Subaru St. Louis": "#013c74",
  "Lou Fusz Subaru O'Fallon": "#013c74",
  "Lou Fusz Kia Columbus": "#05141F",
};

const brandAccentOverrides = {
  Kia: {
    accent: "#05141F",
    visible: "#05141F",
    ink: "#d7e6f2",
  },

async function boot() {
  const [tasks, sources] = [embeddedTracker, embeddedSources];
  state.sources = sources;
  state.tasks = tasks.map((task) => ({
    ...task,
    pageStatus: state.overrides[task.id] || task.pageStatus,
    inventorySignal: state.signalOverrides[task.id] || inferSignal(task),
    accent: brandAccentOverrides[task.make]?.accent || dealerAccents[task.dealer] || "#2563a9",
    accentStyle: accentStyleForTask(task),
    inventoryUrl: sourceFor(task.dealer)?.inventoryUrl || "",
  }));
  populateDealerFilter();
  bindEvents();
  render();
}

async function fetchJson(url) {
  const response = await fetch(url);
  if (!response.ok) {
    throw new Error(`Unable to load ${url}`);
  }
  return response.json();
}

function sourceFor(dealer) {
  return state.sources.find((source) => source.dealer === dealer);
}

function populateDealerFilter() {
  const dealers = [...new Set(state.tasks.map((task) => task.dealer))].sort();
  els.dealerFilter.innerHTML = [
    `<option value="all">All dealerships</option>`,
    ...dealers.map((dealer) => `<option value="${escapeAttr(dealer)}">${escapeHtml(dealer)}</option>`),
  ].join("");
}

function bindEvents() {
  [els.dealerFilter, els.statusFilter, els.searchInput].forEach((el) => {
    el.addEventListener("input", render);
  });

  document.addEventListener("click", (event) => {
    const button = event.target.closest("[data-status]");
    if (button) {
      updateStatus(button.dataset.taskId, button.dataset.status);
      return;
    }

    const signalButton = event.target.closest("[data-signal]");
    if (!signalButton) return;
    updateSignal(signalButton.dataset.taskId, signalButton.dataset.signal);
  });

  els.digestButton.addEventListener("click", () => {
    els.digestText.textContent = buildDigest();
    els.digestDialog.showModal();
  });

  els.scanButton.addEventListener("click", runScan);

  [els.boardViewButton, els.focusViewButton].forEach((button) => {
    button.addEventListener("click", () => setViewMode(button.dataset.view));
  });
}

function filteredTasks() {
  const dealer = els.dealerFilter.value;
  const status = els.statusFilter.value;
  const query = els.searchInput.value.trim().toLowerCase();

  return state.tasks.filter((task) => {
    if (dealer !== "all" && task.dealer !== dealer) return false;
    if (status !== "all" && task.pageStatus !== status) return false;
    if (!query) return true;
    return `${task.dealer} ${task.make} ${task.model} ${task.pageStatus}`.toLowerCase().includes(query);
  });
}

function render() {
  const tasks = filteredTasks();
  const seoTasks = state.tasks.filter((task) =>
    ["needs_seo", "seo_in_progress"].includes(task.pageStatus),
  );
  const buildTasks = state.tasks.filter((task) =>
    ["seo_done", "needs_build", "page_built"].includes(task.pageStatus),
  );

  renderMetrics();
  renderViewMode();
  renderFocusTask();
  renderQueue(els.seoQueue, seoTasks, "seo");
  renderQueue(els.buildQueue, buildTasks, "build");
  renderTable(tasks);

  els.seoCount.textContent = seoTasks.length;
  els.buildCount.textContent = buildTasks.length;
  els.visibleCount.textContent = tasks.length;
}

function renderViewMode() {
  document.body.dataset.view = state.viewMode;
  els.boardViewButton.classList.toggle("is-active", state.viewMode === "board");
  els.focusViewButton.classList.toggle("is-active", state.viewMode === "focus");
}

function renderFocusTask() {
  const task = nextBestTask();
  if (!task) {
    els.focusTitle.textContent = "Everything is clear";
    els.focusMeta.textContent = "No active 2027 model tasks are waiting.";
    els.focusTags.innerHTML = "";
    els.focusActions.innerHTML = "";
    return;
  }

  applyAccentStyle(els.focusPanel, task.accentStyle);
  els.focusTitle.textContent = `${task.year} ${task.make} ${task.model}`;
  els.focusMeta.textContent = `${task.dealer} • ${statusLabels[task.pageStatus]}`;
  els.focusTags.innerHTML = `${signalPill(task.inventorySignal)}${statusPill(task.pageStatus)}`;
  els.focusActions.innerHTML = `
    <div class="signal-actions">${signalButtons(task)}</div>
    <div class="task-actions">${actionButtons(task)}</div>
  `;
}

function renderMetrics() {
  els.metricDetected.textContent = state.tasks.length;
  els.metricSeo.textContent = state.tasks.filter((task) =>
    ["needs_seo", "seo_in_progress"].includes(task.pageStatus),
  ).length;
  els.metricBuild.textContent = state.tasks.filter((task) =>
    ["seo_done", "needs_build", "page_built"].includes(task.pageStatus),
  ).length;
  els.metricLive.textContent = state.tasks.filter((task) => task.pageStatus === "live").length;
}

function renderQueue(container, tasks, type) {
  const topTasks = tasks.slice(0, 8);
  if (!topTasks.length) {
    container.innerHTML = `<div class="empty">No ${type === "seo" ? "SEO" : "build"} tasks waiting.</div>`;
    return;
  }
  container.innerHTML = topTasks.map(renderTask).join("");
}

function renderTask(task) {
  return `
    <article class="task" style="${escapeAttr(task.accentStyle)}">
      <div class="task-title">
        <div>
          <span class="dealer-dot"></span>
          <strong>${escapeHtml(task.year)} ${escapeHtml(task.make)} ${escapeHtml(task.model)}</strong>
        </div>
        <div class="tag-stack">${signalPill(task.inventorySignal)}${statusPill(task.pageStatus)}</div>
      </div>
      <p class="task-meta"><span class="brand-badge">${escapeHtml(task.make || sourceFor(task.dealer)?.shortName || "Brand")}</span>${escapeHtml(task.dealer)}</p>
      <div class="signal-actions">${signalButtons(task)}</div>
      <div class="task-actions">${actionButtons(task)}</div>
    </article>
  `;
}

function renderTable(tasks) {
  els.taskTable.innerHTML = tasks
    .map(
      (task) => `
        <tr>
          <td><span class="table-dealer" style="${escapeAttr(task.accentStyle)}"><span class="dealer-dot"></span><span class="brand-badge">${escapeHtml(task.make || "Brand")}</span>${escapeHtml(task.dealer)}</span></td>
          <td><strong>${escapeHtml(task.year)} ${escapeHtml(task.make)} ${escapeHtml(task.model)}</strong></td>
          <td><div class="tag-stack">${signalPill(task.inventorySignal)}${statusPill(task.pageStatus)}</div></td>
          <td><a href="${escapeAttr(task.inventoryUrl)}" target="_blank" rel="noreferrer">Open inventory</a></td>
          <td><div class="row-actions">${actionButtons(task)}</div></td>
        </tr>
      `,
    )
    .join("");
}

function statusPill(status) {
  return `<span class="status status-${escapeAttr(status)}">${escapeHtml(statusLabels[status] || status)}</span>`;
}

function signalPill(signal) {
  return `<span class="signal signal-${escapeAttr(signal)}">${escapeHtml(signalLabels[signal] || signal)}</span>`;
}

function actionButtons(task) {
  return (transitions[task.pageStatus] || [])
    .map(
      ([nextStatus, label]) =>
        `<button class="button" type="button" data-task-id="${escapeAttr(task.id)}" data-status="${escapeAttr(nextStatus)}">${escapeHtml(label)}</button>`,
    )
    .join("");
}

function signalButtons(task) {
  return Object.entries(signalLabels)
    .map(([signal, label]) => {
      const active = task.inventorySignal === signal ? " is-active" : "";
      return `<button class="mini-button${active}" type="button" data-task-id="${escapeAttr(task.id)}" data-signal="${escapeAttr(signal)}">${escapeHtml(label)}</button>`;
    })
    .join("");
}

function updateStatus(taskId, status) {
  const task = state.tasks.find((candidate) => candidate.id === taskId);
  if (!task) return;

  task.pageStatus = status;
  state.overrides[taskId] = status;
  localStorage.setItem("pipeline-status-overrides", JSON.stringify(state.overrides));
  showToast(`${task.model} moved to ${statusLabels[status] || status}`);
  render();
}

function updateSignal(taskId, signal) {
  const task = state.tasks.find((candidate) => candidate.id === taskId);
  if (!task) return;

  task.inventorySignal = signal;
  state.signalOverrides[taskId] = signal;
  localStorage.setItem("pipeline-signal-overrides", JSON.stringify(state.signalOverrides));
  showToast(`${task.model} tagged ${signalLabels[signal] || signal}`);
  render();
}

function setViewMode(viewMode) {
  state.viewMode = viewMode;
  localStorage.setItem("pipeline-view-mode", viewMode);
  showToast(`${viewMode === "focus" ? "Focus" : "Board"} view enabled`);
  render();
}

async function runScan() {
  els.scanButton.disabled = true;
  els.scanButton.textContent = "Scanning";
  try {
    const response = await fetch("/.netlify/functions/scan-inventory");
    if (!response.ok) throw new Error("scan unavailable");
    const result = await response.json();
    mergeScanResults(result.detected || []);
    if (result.errors?.length) {
      showDigest(`Scan completed with ${result.errors.length} blocked source(s).\n\n${formatScanErrors(result.errors)}`);
    }
  } catch {
    mergeScanResults(seedDetectedFromTracker());
    showDigest(
      "Live scan is not available in the static preview, so the dashboard is using the current 2027 tracker as its source.\n\nWhen deployed, the scanner will check the /llm/inventory/ endpoints and create one task per year + make + model.",
    );
  } finally {
    els.scanButton.disabled = false;
    els.scanButton.textContent = "Run Scan";
    render();
  }
}

function mergeScanResults(detected) {
  const existing = new Set(state.tasks.map((task) => task.id));
  detected.forEach((item) => {
    const id = `${item.dealer}|${item.year}|${item.model}`.toLowerCase().replace(/\s+/g, "-");
    if (existing.has(id)) return;
    existing.add(id);
    state.tasks.push({
      id,
      dealer: item.dealer,
      year: Number(item.year),
      make: item.make || "",
      model: item.model,
      pageStatus: "needs_seo",
      inventoryUrl: sourceFor(item.dealer)?.inventoryUrl || "",
      source: "inventory-scan",
    });
  });
}

function seedDetectedFromTracker() {
  return state.tasks
    .filter((task) => task.year >= 2027 && task.pageStatus !== "live")
    .map((task) => ({
      dealer: task.dealer,
      year: task.year,
      make: task.make,
      model: task.model,
    }));
}

function inferSignal(task) {
  if (task.pageStatus === "live") return "on_lot";
  if (["seo_done", "needs_build", "page_built"].includes(task.pageStatus)) return "shipped";
  return "upcoming";
}

function nextBestTask() {
  const priority = {
    needs_review: 0,
    needs_seo: 1,
    seo_in_progress: 2,
    seo_done: 3,
    needs_build: 4,
    page_built: 5,
    snoozed: 8,
    ignored: 9,
    live: 10,
  };
  return [...state.tasks]
    .filter((task) => !["live", "ignored", "snoozed"].includes(task.pageStatus))
    .sort((a, b) => (priority[a.pageStatus] ?? 7) - (priority[b.pageStatus] ?? 7))[0];
}

let toastTimer;
function showToast(message) {
  els.toast.textContent = message;
  els.toast.classList.add("is-visible");
  window.clearTimeout(toastTimer);
  toastTimer = window.setTimeout(() => {
    els.toast.classList.remove("is-visible");
  }, 2200);
}

function buildDigest() {
  const needsSeo = state.tasks.filter((task) => task.pageStatus === "needs_seo");
  const readyBuild = state.tasks.filter((task) =>
    ["seo_done", "needs_build", "page_built"].includes(task.pageStatus),
  );
  const live = state.tasks.filter((task) => task.pageStatus === "live");

  const lines = [
    "2027 Model Pipeline Digest",
    "",
    `Needs SEO: ${needsSeo.length}`,
    ...needsSeo.slice(0, 12).map((task) => `- ${task.dealer}: ${task.year} ${task.make} ${task.model}`),
    "",
    `Ready / In Build: ${readyBuild.length}`,
    ...readyBuild.slice(0, 12).map((task) => `- ${task.dealer}: ${task.year} ${task.make} ${task.model} (${statusLabels[task.pageStatus]})`),
    "",
    `Live / Checked: ${live.length}`,
  ];

  return lines.join("\n");
}

function showDigest(text) {
  els.digestText.textContent = text;
  els.digestDialog.showModal();
}

function formatScanErrors(errors) {
  return errors
    .slice(0, 12)
    .map((error) => `- ${error.dealer}: ${error.message}`)
    .join("\n");
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(value) {
  return escapeHtml(value);
}

function accentStyle(hex) {
  const rgb = hexToRgb(hex);
  if (!rgb) {
    return "--accent:#2563a9;--accent-soft:rgba(37,99,169,.18);--accent-border:rgba(37,99,169,.55);--accent-ink:#78b7ff;";
  }
  const { r, g, b } = rgb;
  return [
    `--accent:${hex}`,
    `--accent-visible:${hex}`,
    `--accent-soft:rgba(${r},${g},${b},.18)`,
    `--accent-card:rgba(${r},${g},${b},.13)`,
    `--accent-border:rgba(${r},${g},${b},.58)`,
    `--accent-glow:rgba(${r},${g},${b},.42)`,
    `--accent-ink:${brighten(hex, 42)}`,
  ].join(";");
}

function accentStyleForTask(task) {
  const make = task.make;
  const override = brandAccentOverrides[make];
  if (!override) return accentStyle(dealerAccents[task.dealer] || "#2563a9");

  const rgb = hexToRgb(override.visible);
  if (!rgb) return accentStyle(override.accent);
  const { r, g, b } = rgb;
  return [
    `--accent:${override.accent}`,
    `--accent-visible:${override.visible}`,
    `--accent-soft:rgba(${r},${g},${b},.22)`,
    `--accent-card:rgba(${r},${g},${b},.16)`,
    `--accent-border:rgba(${r},${g},${b},.68)`,
    `--accent-glow:rgba(${r},${g},${b},.54)`,
    `--accent-ink:${override.ink}`,
  ].join(";");
}

function applyAccentStyle(element, styleText) {
  styleText.split(";").forEach((declaration) => {
    const [property, value] = declaration.split(":");
    if (property && value) element.style.setProperty(property.trim(), value.trim());
  });
}

function hexToRgb(hex) {
  const clean = String(hex).replace("#", "").trim();
  if (!/^[0-9a-f]{6}$/i.test(clean)) return null;
  return {
    r: parseInt(clean.slice(0, 2), 16),
    g: parseInt(clean.slice(2, 4), 16),
    b: parseInt(clean.slice(4, 6), 16),
  };
}

function brighten(hex, amount) {
  const rgb = hexToRgb(hex);
  if (!rgb) return "#78b7ff";
  const toHex = (value) => Math.max(0, Math.min(255, value)).toString(16).padStart(2, "0");
  return `#${toHex(rgb.r + amount)}${toHex(rgb.g + amount)}${toHex(rgb.b + amount)}`;
}

boot().catch((error) => {
  document.body.innerHTML = `<main><div class="empty">${escapeHtml(error.message)}</div></main>`;
});

    </script>
  </body>
